---
- name: Configure MySQL database server for WordPress
  hosts: database
  become: true
  vars:
    # The Agile611 image is based on Debian Trixie, while Oracle's MySQL APT
    # repository currently publishes Debian Bookworm packages. The Bookworm
    # repository is used here deliberately so the exercise installs true MySQL
    # instead of Debian's MariaDB-compatible default packages.
    # Oracle MySQL repository key currently causes an expired-key failure in
    # this Debian Trixie lab. For this disposable classroom lab only, the
    # repository is marked trusted so the original MySQL exercise remains
    # executable. Do not use this trusted=yes approach in production.
    mysql_apt_repository: "deb [trusted=yes] http://repo.mysql.com/apt/debian/ bookworm mysql-8.4-lts"
    # Oracle MySQL 8.4 Debian 12 packages depend on libaio1. Debian Trixie
    # does not provide this package name by default, so this lab installs the
    # Debian Bookworm compatibility package before installing mysql-server.
    mysql_libaio_deb_url: "http://deb.debian.org/debian/pool/main/liba/libaio/libaio1_0.3.113-4_amd64.deb"
  tasks:
    - name: Install prerequisites for the official MySQL APT repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - gnupg
          - curl
          - python3-pymysql
        state: present
        update_cache: true

    - name: Stop MariaDB if it exists from a previous lab attempt
      ansible.builtin.service:
        name: mariadb
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove MariaDB server packages if installed from a previous lab attempt
      ansible.builtin.apt:
        name:
          - mariadb-server
          - mariadb-client
        state: absent
        purge: true
        autoremove: true
      failed_when: false

    - name: Remove previous signed MySQL APT repository definition if present
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/mysql-community.list
        state: absent

    - name: Add official MySQL APT repository for this lab
      ansible.builtin.apt_repository:
        repo: "{{ mysql_apt_repository }}"
        filename: mysql-community
        state: present
        update_cache: false

    - name: Update APT cache after adding MySQL repository
      ansible.builtin.apt:
        update_cache: true

    - name: Download libaio1 compatibility package required by Oracle MySQL
      ansible.builtin.get_url:
        url: "{{ mysql_libaio_deb_url }}"
        dest: /tmp/libaio1_0.3.113-4_amd64.deb
        mode: '0644'

    - name: Install libaio1 compatibility package
      ansible.builtin.apt:
        deb: /tmp/libaio1_0.3.113-4_amd64.deb

    - name: Preseed MySQL root password prompt with an empty lab password
      ansible.builtin.debconf:
        name: mysql-community-server
        question: "{{ item }}"
        value: ""
        vtype: password
      loop:
        - mysql-community-server/root-pass
        - mysql-community-server/re-root-pass

    - name: Install Oracle MySQL server packages
      ansible.builtin.apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure MySQL is started and enabled
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Allow MySQL to listen on all interfaces
      ansible.builtin.lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
        backup: true
      notify: Restart MySQL

    - name: Create WordPress database
      ansible.mysql.mysql_db:
        name: "{{ wp_db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create WordPress database user
      ansible.mysql.mysql_user:
        name: "{{ wp_db_user }}"
        password: "{{ wp_db_password }}"
        priv: "{{ wp_db_name }}.*:ALL"
        host: "{{ wp_db_user_host }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

  handlers:
    - name: Restart MySQL
      ansible.builtin.service:
        name: mysql
        state: restarted
