---
- name: Clean WordPress files from the webserver
  hosts: webserver
  become: true
  tasks:
    - name: Disable WordPress Apache site
      ansible.builtin.file:
        path: "/etc/apache2/sites-enabled/{{ apache_site_name }}"
        state: absent

    - name: Remove WordPress Apache site definition
      ansible.builtin.file:
        path: "/etc/apache2/sites-available/{{ apache_site_name }}"
        state: absent

    - name: Remove WordPress document root
      ansible.builtin.file:
        path: "{{ wp_document_root }}"
        state: absent

    - name: Restart Apache
      ansible.builtin.service:
        name: apache2
        state: restarted

- name: Clean WordPress database and user
  hosts: database
  become: true
  tasks:
    - name: Remove WordPress database using MySQL CLI
      ansible.builtin.command:
        argv:
          - mysql
          - --protocol=socket
          - -uroot
          - -S
          - /var/run/mysqld/mysqld.sock
          - -e
          - "DROP DATABASE IF EXISTS `{{ wp_db_name }}`;"
      changed_when: true

    - name: Remove WordPress database user using MySQL CLI
      ansible.builtin.command:
        argv:
          - mysql
          - --protocol=socket
          - -uroot
          - -S
          - /var/run/mysqld/mysqld.sock
          - -e
          - "DROP USER IF EXISTS '{{ wp_db_user }}'@'{{ wp_db_user_host }}'; FLUSH PRIVILEGES;"
      changed_when: true

- name: Clean optional Nginx load balancer configuration
  hosts: loadbalancer
  become: true
  tasks:
    - name: Disable WordPress Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/wordpress
        state: absent

    - name: Remove WordPress Nginx site definition
      ansible.builtin.file:
        path: /etc/nginx/sites-available/wordpress
        state: absent

    - name: Restart Nginx if installed
      ansible.builtin.service:
        name: nginx
        state: restarted
      ignore_errors: true
